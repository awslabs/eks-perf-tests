apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-s3-config
  namespace: tekton-pipelines
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Parsers_File  /config/parsers.conf

    [INPUT]
        Name              tail
        Tag               <pod_name>_<namespace_name>_<container_name>
        Tag_Regex         /var/log/containers/(?<pod_name>[^_]+)_(?<namespace_name>[^_]+)_(?<container_name>.+)-[a-f0-9]{64}\.log
        Path              /var/log/containers/*_scalability_*.log
        Parser            cri
        Refresh_Interval  5
        Mem_Buf_Limit     50MB

    [OUTPUT]
        Name                         s3
        Match                        *
        bucket                       ${RESULTS_BUCKET}
        region                       ${AWS_REGION}
        role_arn                     ${TEKTON_EXECUTOR_ROLE_ARN}
        s3_key_format                /logs/$TAG[1]/$TAG[0]/$TAG[2]/%Y%m%d%H%M%S
        s3_key_format_tag_delimiters _
        total_file_size              1M
        upload_timeout               30s
        store_dir                    /tmp/fluent-bit/s3
        use_put_object               On
        content_type                 text/plain
        log_key                      message

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<message>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
