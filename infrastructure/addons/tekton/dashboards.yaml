apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tekton-dashboards
  namespace: flux-system
spec:
  dependsOn:
    - name: tekton-operator
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: platform-config
  path: ./infrastructure/addons/tekton/dashboards
  prune: true
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-config
      - kind: Secret
        name: federate-oidc-secret
