apiVersion: operator.tekton.dev/v1alpha1
kind: TektonConfig
metadata:
  name: config
spec:
  profile: all
  chain:
    disabled: true
  pipeline:
    default-timeout-minutes: 240
    default-task-run-workspace-binding: "emptyDir: {}"
    default-pod-template:
      metadata:
        annotations:
          karpenter.sh/do-not-disrupt: "true"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            namespaceSelector:
              matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                - flux-system
                - tekton-pipelines
  dashboard:
    readonly: false
    options:
      deployments:
        tekton-dashboard:
          spec:
            template:
              spec:
                containers:
                - name: tekton-dashboard
                  args:
                  - --external-logs=http://tekton-log-server.tekton-pipelines.svc.cluster.local:3000
  hub:
    options: {}
  result:
    disabled: false
