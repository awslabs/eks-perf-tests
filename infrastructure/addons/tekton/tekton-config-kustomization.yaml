apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tekton-config
  namespace: flux-system
spec:
  dependsOn:
    - name: tekton-operator
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/addons/tekton/config
  prune: false
  timeout: 5m
