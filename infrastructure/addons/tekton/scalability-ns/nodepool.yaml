apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: scalability
spec:
  template:
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      taints:
      - key: workload
        value: scalability
        effect: NoSchedule
      requirements:
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["on-demand"]
      - key: node.kubernetes.io/instance-type
        operator: In
        values: ["m5.8xlarge", "m5.12xlarge", "r5.8xlarge", "c5.9xlarge"]
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 5m
