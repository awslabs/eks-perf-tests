apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tekton-operator
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: Bucket
    name: tekton-operator
  path: ./operator/previous/v0.77.0
  prune: true
  wait: true
  timeout: 10m
  # Pin tekton-operator + webhook Deployments to management nodepool
  patches:
    - target:
        kind: Deployment
        namespace: tekton-operator
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: unused
        spec:
          template:
            metadata:
              annotations:
                karpenter.sh/do-not-disrupt: "true"
            spec:
              nodeSelector:
                karpenter.sh/nodepool: management
              tolerations:
              - key: workload
                value: management
                effect: NoSchedule
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: tekton-operator
      namespace: tekton-operator
    - apiVersion: apps/v1
      kind: Deployment
      name: tekton-operator-webhook
      namespace: tekton-operator
