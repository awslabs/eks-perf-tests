apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alb-secret-reader
  namespace: tekton-pipelines
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alb-secret-reader
  namespace: tekton-pipelines
subjects:
  - kind: Group
    name: eks:managed
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: alb-secret-reader
  apiGroup: rbac.authorization.k8s.io

