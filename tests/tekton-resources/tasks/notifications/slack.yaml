---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: slack-notification
  namespace: scalability
spec:
  description: |
    sends slack notification for a given slack hook
  params:
  - name: slack-hook
    default: ''
    description: Slack webhook URL. Skipped if empty or placeholder.
  - name: slack-message
    default: 'default'
    description: The message you want to post.
  steps:
  - name: send-notification
    image: alpine/k8s:1.23.7
    script: |
      HOOK="$(params.slack-hook)"
      if [ -n "$HOOK" ] && echo "$HOOK" | grep -q "^http"; then
        curl -H "Content-type: application/json" --data '{"Message": "$(params.slack-message)"}' -X POST "$HOOK"
      else
        echo "No valid Slack webhook configured, skipping notification"
      fi
