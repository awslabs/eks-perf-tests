apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name:  cloudwatch
  namespace: scalability
spec:
  description: "Cloudwatch task publishes the provided metric data points to Amazon CloudWatch. More details can be found in the aws cli reference doc: https://awscli.amazonaws.com/v2/documentation/api/2.1.29/reference/cloudwatch/put-metric-data.html"
  params:
    - name: region
      default: "us-west-2"
      description: "The region to use for publishing the metrics"
    - name: metric-name 
      default: "cl2-loadtest"
      description: "The name of the metric you want to pass"
    - name: namespace
      description: "The namespace for the metric data"
    - name: dimensions
      description: "Dimensions to associate with the metrics"
    - name: unit
      default: "Count"
      description: "The unit of the metrics"
    - name: value
      description: "The value for the metric"
    - name: run-id
      description: "Pipeline runId required for populating runId dimension to be queried for dashboards later"
      default: ""
    - name: manifest-id
      description: "Manifest Id for metric dimension used as identifier for dashboards later"
      default: ""
  steps:
  - name: cw-emit
    image: amazon/aws-cli
    script: |
      aws sts get-caller-identity
      aws cloudwatch --region $(params.region) put-metric-data --metric-name $(params.metric-name) --namespace $(params.namespace) --dimensions Nodes=$(params.dimensions) --unit $(params.unit) --value $(params.value) 
      if [ -n "$(params.run-id)" ]; then
        aws cloudwatch --region $(params.region) put-metric-data --metric-name $(params.metric-name) --namespace $(params.namespace) --dimensions Nodes=$(params.dimensions),RunId=$(params.run-id) --value $(params.value)
      elif [ -n "$(params.manifest-id)" ]; then
        aws cloudwatch --region $(params.region) put-metric-data --metric-name $(params.metric-name) --namespace $(params.namespace) --dimensions Nodes=$(params.dimensions),ManifestId=$(params.manifest-id) --value $(params.value)
      fi
